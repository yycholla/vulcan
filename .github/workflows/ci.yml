name: ci

on:
  pull_request:
    types: [opened, reopened, synchronize]
    # Skip Graphite-internal temporary bases. They get deleted as the
    # stack rebases, which would otherwise leave dangling failing checks.
    # https://graphite.com/docs/setup-recommended-ci-settings
    branches-ignore:
      - "**/graphite-base/**"
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when a new push lands.
# Saves CI minutes during stack restacks (which push frequently).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege GITHUB_TOKEN per CodeQL `actions/missing-workflow-permissions`.
# Read-only at the workflow level; jobs that need more (e.g. uploading
# artifacts) inherit, since artifact upload uses a separate token scope.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Pre-existing warnings on main; gate is informational until cleanup
      # tracked in YYC follow-up. Remove `continue-on-error` once clean.
      - run: cargo clippy --all-targets --all-features
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "gateway"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Build
        run: cargo build --all-targets --features "${{ matrix.features }}"
      # Test target set excludes `--benches` deliberately. The divan
      # benches (`tui_render`, `agent_core`) are measurement loops, not
      # tests — under nextest they hit the 120s per-test timeout, retry
      # 3x, and break the test run. Benches get exercised by `cargo bench`
      # in `bench.yml`, not here.
      - name: Test (nextest)
        run: cargo nextest run --profile ci --lib --bins --tests --features "${{ matrix.features }}"
      - name: Doc tests
        run: cargo test --doc --features "${{ matrix.features }}"
      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.features || 'default' }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  coverage:
    # Heavy job (~30m). Skip on PRs — coverage delta isn't a per-PR
    # gate, and the lcov upload still lands on every push to main so
    # the trend graph stays current. Saves a runner slot per PR push.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - name: Generate coverage (lcov)
        run: cargo llvm-cov nextest --all-features --workspace --lcov --output-path lcov.info
      - name: Coverage summary
        # `report` reads the data the previous `nextest` step generated;
        # it doesn't take feature flags. Newer cargo-llvm-cov rejects
        # `--all-features` on this subcommand outright.
        run: cargo llvm-cov report --summary-only
      - name: Upload lcov
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 14

  feature-powerset:
    # Combinatorial feature check — slow (~20m) and rarely informative
    # per PR. Run on push to main so a regression still gets caught
    # before release; PR feedback stays fast.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack check --feature-powerset --no-dev-deps --exclude-features bench-soak

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  machete:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: bnjbvr/cargo-machete@main
