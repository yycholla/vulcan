when:
  - event: ["push", "manual"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: "nixery"

clone:
  skip: false
  depth: 1
  submodules: false

dependencies:
  nixpkgs:
    - bash
    - coreutils
    - findutils
    - git
    - gnugrep
    - gnused
    - cacert
    - pkg-config
    - openssl.dev
    - gcc
    - gnumake
    - cmake
    - perl
    - rustc
    - cargo
    - rustfmt
    - clippy

environment:
  CARGO_TERM_COLOR: "always"
  RUSTFLAGS: "-D warnings"

steps:
  - name: "Show Rust environment"
    command: |
      set -euo pipefail
      rustc --version
      cargo --version
      cargo fmt --version
      cargo clippy --version
      echo "pipeline: ${TANGLED_PIPELINE_ID}"
      echo "repo: ${TANGLED_REPO_URL}"
      echo "sha: ${TANGLED_SHA:-manual-or-pr}"

  - name: "Format check"
    command: |
      set -euo pipefail
      cargo fmt --all -- --check

  - name: "Check default features"
    command: |
      set -euo pipefail
      export PKG_CONFIG_PATH="$(find /nix/store -path '*/openssl-*-dev/lib/pkgconfig' -print -quit):${PKG_CONFIG_PATH:-}"
      cargo check --all-targets

  - name: "Check gateway feature"
    command: |
      set -euo pipefail
      export PKG_CONFIG_PATH="$(find /nix/store -path '*/openssl-*-dev/lib/pkgconfig' -print -quit):${PKG_CONFIG_PATH:-}"
      cargo check --all-targets --features gateway

  - name: "Clippy informational"
    command: |
      set +e
      export PKG_CONFIG_PATH="$(find /nix/store -path '*/openssl-*-dev/lib/pkgconfig' -print -quit):${PKG_CONFIG_PATH:-}"
      cargo clippy --all-targets --all-features
      code=$?
      if [ "$code" -ne 0 ]; then
        echo "clippy reported warnings/errors; keeping this informational to match GitHub CI baseline"
      fi
      exit 0
