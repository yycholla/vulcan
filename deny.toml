# cargo-deny config — supply-chain hygiene for vulcan.
# Run locally: `cargo deny check`
# CI: `.github/workflows/ci.yml` (deny job)

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
# Track upstream advisories we've intentionally accepted. Each entry
# must include rationale + a path back to fix.
ignore = [
    # RUSTSEC-2026-0104: rustls-webpki 0.102.8 panics on syntactically-
    # valid empty BIT STRING in CRL onlySomeReasons. Reaches us via
    # serenity 0.12.5 → tokio-tungstenite 0.21.0 → rustls 0.22.4. We
    # do not parse CRLs anywhere in our own code; serenity only opens
    # WebSockets. Upstream serenity needs to bump tungstenite + rustls
    # to consume the fix. Re-evaluate on next serenity major.
    { id = "RUSTSEC-2026-0104", reason = "transitive via serenity; CRL path unreachable for us." },
    # RUSTSEC-2026-0099: rustls-webpki 0.102.8 mishandles wildcard names
    # in DNS subtree name constraints. Same chain as 0104 (serenity →
    # tokio-tungstenite → rustls 0.22.4 → rustls-webpki 0.102.8). The
    # vulnerability is reachable only after signature verification of a
    # mis-issued certificate; we don't run a CA / accept user-controlled
    # PKI. Re-evaluate on next serenity major.
    { id = "RUSTSEC-2026-0099", reason = "transitive via serenity; name-constraint path requires CA mis-issuance." },
    # RUSTSEC-2026-0049: CRLs not considered authoritative by
    # Distribution Point due to faulty matching logic. Same
    # rustls-webpki 0.102.8 chain via serenity. We don't validate CRLs
    # against Distribution Points; the WebSocket TLS path serenity
    # uses doesn't reach this matcher.
    { id = "RUSTSEC-2026-0049", reason = "transitive via serenity; CRL matching path unreachable." },
    # RUSTSEC-2026-0098: name constraints for URI names were
    # incorrectly accepted. Same chain. The advisory itself notes
    # rustls-webpki has no API for asserting URI names, so the
    # constraint check was running on input the library doesn't accept
    # in the first place. Functionally unreachable for our usage.
    { id = "RUSTSEC-2026-0098", reason = "transitive via serenity; URI name constraint API not exposed." },
    # RUSTSEC-2025-0141: bincode 1.3.3 is marked unmaintained, but the
    # advisory states that 1.3.3 is considered complete and has no safe
    # upgrade path. It reaches us through cortex-memory-core; revisit
    # when cortex-memory-core offers a serializer migration.
    { id = "RUSTSEC-2025-0141", reason = "transitive via cortex-memory-core; unmaintained-only advisory with no safe upgrade." },
    # RUSTSEC-2025-0119: number_prefix is unmaintained and reaches us
    # through indicatif -> hf-hub -> fastembed. Runtime impact is limited
    # to progress formatting in transitive model download plumbing; revisit
    # when hf-hub/fastembed removes the dependency.
    { id = "RUSTSEC-2025-0119", reason = "transitive via fastembed/hf-hub progress formatting; no safe upgrade." },
    # RUSTSEC-2024-0436: paste is unmaintained and reaches us through
    # macro/transcoding dependencies below fastembed. No vulnerability is
    # cited; revisit when tokenizers/rav1e remove paste or provide a
    # compatible replacement path.
    { id = "RUSTSEC-2024-0436", reason = "transitive via fastembed dependencies; unmaintained-only advisory with no safe upgrade." },
]

[licenses]
version = 2
# MIT-compatible permissive set. Project itself is MIT.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    # NCSA is BSD/MIT-like and OSI-approved. It is pulled by
    # libfuzzer-sys through rav1e -> ravif -> image -> fastembed.
    "NCSA",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    # CDLA-Permissive-2.0 is similar to MIT/Apache (data + code
    # permissive). Used by `webpki-roots` and a few other transitive
    # crates. https://cdla.dev/permissive-2-0/
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
# all-features pulls several intentional old-major/new-major pairs through
# gateway, cortex, and frontend stacks. Keep duplicate-version cleanup as
# maintenance work rather than a hard CI gate for feature slices.
multiple-versions = "allow"
# In-workspace path dependencies intentionally omit published versions while
# the crate split is still evolving. Revisit before publishing workspace
# members outside this repository.
wildcards = "allow"
# Crates the workspace must never link against.
deny = []
# Allow known-acceptable duplicate-version sources (e.g. transitive
# old-major pulls). Empty until cargo-deny actually flags one.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
