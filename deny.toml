# cargo-deny config — supply-chain hygiene for vulcan.
# Run locally: `cargo deny check`
# CI: `.github/workflows/ci.yml` (deny job)

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
# MIT-compatible permissive set. Project itself is MIT.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Crates the workspace must never link against.
deny = []
# Allow known-acceptable duplicate-version sources (e.g. transitive
# old-major pulls). Empty until cargo-deny actually flags one.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
