[package]
name = "vulcan"
version = "0.1.0"
edition = "2024"
description = "A Rust AI agent — forged at the forge, tested by fire"
authors = ["Colin Hanway"]
license = "MIT"
repository = "https://github.com/yycholla/vulcan"
readme = "README.md"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP / LLM API
reqwest = { version = "0.13", features = ["json", "stream"] }

# Async trait support (needed for dyn-compatible tool/provider traits)
async-trait = "0.1"

# Stream processing for SSE responses
futures-util = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"

# CLI + TUI
clap = { version = "4", features = ["derive"] }
ratatui = "0.30"
crossterm = "0.29"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# UUID for session IDs
uuid = { version = "1", features = ["v4"] }
tokio-util = { version = "0.7.18", features = ["rt"] }
rusqlite = { version = "0.39.0", features = ["bundled"] }
strsim = "0.11.1"
portable-pty = "0.9.0"

[profile.release]
opt-level = "z"    # optimize for size
lto = true
codegen-units = 1
strip = true

[dev-dependencies]
tempfile = "3.27.0"
