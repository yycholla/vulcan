# Vulcan Configuration
# Located at ~/.vulcan/config.toml

[provider]
# Provider type: "openai-compat" (works with OpenRouter, Anthropic, OpenAI, Ollama, etc.)
type = "openai-compat"
# Base URL for the API
base_url = "https://openrouter.ai/api/v1"
# API key — can also be set via VULCAN_API_KEY env var
# api_key = "sk-..."
# Model to use
model = "deepseek/deepseek-v4-flash"
# Max context size in tokens
max_context = 128000
# Max retries on transient API failures (429, 5xx, network errors).
# Backoff is exponential with jitter: 1s, 2s, 4s, 8s, 16s.
max_retries = 4
# How long to cache the provider's model catalog before re-fetching (hours).
# Vulcan validates `model` against this catalog at startup and uses its
# `context_length` to size the LLM context window.
catalog_cache_ttl_hours = 24
# Skip the catalog fetch entirely. Useful for offline/testing setups.
# disable_catalog = false
# Provider protocol debug logging:
# - "off": no extra provider logs
# - "tool-fallback": log raw assistant content when fallback tool-call parsing is used
# - "wire": also log request and raw response bodies
# debug = "off"
# Max agent loop iterations per prompt. 0 = unlimited (default).
# When the agent hits this limit without a text-only response, the turn
# ends with a "reached maximum iteration limit" message.
# max_iterations = 0

# Optional named provider profiles. The active TUI `/model` command uses
# `[provider]` today; named profiles bind base URL, auth, and default model
# together for provider switching work tracked after YYC-92.
# [providers.local]
# type = "openai-compat"
# base_url = "http://localhost:11434/v1"
# api_key = "ollama"
# model = "qwen2.5-coder:latest"
# disable_catalog = true

[tools]
# Enable dangerous tools (file overwrite, shell exec) without confirmation
yolo_mode = false

# How aggressively to redirect bash invocations to native-tool equivalents
# (YYC-84 / YYC-89). The PreferNativeTools hook reads this:
#   off   — hook disabled, no redirects.
#   warn  — log + count via the audit hook (YYC-88), pass through.
#   block — return Block with a redirect message (default).
native_enforcement = "block"

# Per-tool approval gate (YYC-76). Default is "always" (no prompts) so
# the gate is opt-in. Set entries to "ask" or "session" for per-tool
# granularity — TUI will pause on the gate and render inline pills.
# `yolo_mode = true` above forces the default back to "always" no matter
# what's set here.
[tools.approval]
default = "always"
# write_file = "session"   # prompt once per session
# git_push   = "ask"        # prompt every push
# bash       = "ask"

# YYC-130: SafetyHook policy + per-session quota for dangerous shell
# patterns (rm -rf /, dd, mkfs, force push, ...).
#   policy = "prompt" — pause the agent and ask the user (default;
#                       matches legacy behavior).
#   policy = "block"  — never prompt; hard-block every dangerous match.
#                       Useful for unattended / CI runs.
#   policy = "allow"  — never prompt and never block. NOT recommended.
# quota_per_session caps how many times an approved-and-remembered
# dangerous command can fire before the hook re-prompts. 0 disables
# the cap (legacy behavior — once approved, runs unlimited).
[tools.dangerous_commands]
policy = "prompt"
quota_per_session = 5

[compaction]
# Auto-compress context when token usage is high
enabled = true
# Trigger compaction when context is 85% full
trigger_ratio = 0.85
# Reserved tokens for LLM response generation
reserved_tokens = 50000

[embeddings]
# Off by default — flip to true after configuring an OpenAI-compatible
# embeddings endpoint. The agent then registers `index_code_embeddings`
# and `code_search_semantic` (YYC-48).
enabled = false
# Base URL. Leave blank to fall back to [provider].base_url — convenient
# for OpenRouter / OpenAI users whose chat + embedding origins match.
# base_url = "https://api.openai.com/v1"
# Optional override for the API key. Falls back to [provider].api_key
# (or VULCAN_API_KEY) when omitted.
# api_key = "sk-..."
model = "text-embedding-3-small"
dim = 1536

[tui]
# Theme name. Built-ins:
#   system          — inherit terminal palette (default)
#   default-light   — Bauhaus cream/ink, the formalized current look
#   dracula         — canonical dark palette
theme = "system"

# [gateway]
# bind = "127.0.0.1:7777"
# api_token = "..."           # required when running `vulcan gateway`; generated on first run if absent
# idle_ttl_secs = 1800
# max_concurrent_lanes = 64
# outbound_max_attempts = 5

# [gateway.telegram]
# enabled = false
# bot_token = "..."
# webhook_secret = "..."

# [gateway.discord]
# enabled = false
# bot_token = "..."
# allow_bots = false

[keybinds]
# TUI key bindings (YYC-90). Strings are parsed at startup; unparseable
# values fall back to the defaults shown here with a tracing warning.
# Recognised forms:
#   - "Ctrl+K" / "Alt+T" / "Shift+F4"
#   - Caret sigils:  "⌃K" (Ctrl), "⌥T" (Alt), "⇧F4" (Shift)
#   - Function keys: "F1" .. "F24"
#   - Named keys:    "Esc", "Enter", "Tab", "Backspace", "Up"/"Down"/"Left"/"Right"
toggle_sessions  = "Ctrl+K"        # open the session picker (Insert mode)
toggle_tools     = "Ctrl+T"        # switch to the trading-floor tool log
toggle_reasoning = "Ctrl+R"        # show/hide reasoning traces
cancel           = "Ctrl+C"        # cancel current turn / quit
queue_drop       = "Ctrl+Backspace" # pop the most recent queued submission
